spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ansim_yoyang?serverTimezone=UTC
    username: appuser
    password: 1111
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    validate-migration-naming: false
    clean-disabled: true
    url: jdbc:mysql://localhost:3306/ansim_yoyang?serverTimezone=UTC
    user: appuser
    password: 1111

# HTTP 설정 (개발/테스트용)
server:
  port: 8080  # HTTP 포트

# OpenAI API 설정
openai:
  api:
    key: ${OPENAI_API_KEY:}
    url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
